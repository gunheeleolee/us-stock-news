<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Stock News</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="layout">

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
      <header>
        <h1>US Stock News</h1>
        <p>AI 번역 및 요약</p>
      </header>

      <!-- 브리핑 -->
      <div class="daily-brief" id="brief-section">
        <div class="brief-date" id="brief-date"></div>
        <div class="brief-text" id="brief-text">브리핑 불러오는 중...</div>
        <div class="brief-picks">
          <div class="picks-label">📌 오늘 꼭 읽어야 할 기사</div>
          <div id="picks-list"></div>
        </div>
      </div>

      <!-- 시장 분석 -->
<div class="market-analysis-section">
  <div class="analysis-title">📊 단기 시장 방향성</div>
  <div id="market-analysis">
    <div class="analysis-comment">분석 불러오는 중...</div>
  </div>
</div>

      <!-- 내부자 거래 -->
      <div class="insider-section" id="insider-section">
        <div class="insider-title">🔍 내부자 거래 (Form 4)</div>
        <div id="insider-list" class="insider-list">불러오는 중...</div>
      </div>

      <!-- 기사 목록 -->
      <div class="news-list" id="news-list">
        <div class="empty">기사 불러오는 중...</div>
      </div>

      <div class="disclaimer">
        ※ 본 서비스는 투자 참고용 정보만 제공하며, 투자 추천이나 자문이 아닙니다.
      </div>
    </main>

    <!-- 사이드바 (웹) / 슬라이딩 메뉴 (모바일) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- 시세 -->
        <div class="sidebar-section">
          <div class="sidebar-title">시세</div>
          <div class="market-bar" id="market-bar">불러오는 중...</div>
        </div>

        <!-- 필터 -->
        <div class="sidebar-section">
          <div class="sidebar-title">필터</div>
          <div id="filters"></div>
        </div>

      </div>
    </aside>

    <!-- 모바일 메뉴 버튼 -->
    <button class="mobile-menu-btn" id="mobile-menu-btn">
      ☰ 시세 · 필터
    </button>

    <!-- 모바일 오버레이 -->
    <div class="overlay" id="overlay"></div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
